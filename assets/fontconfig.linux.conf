<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- toolkit 자체 폰트 라이브러리 (Docker /work 마운트 기준) -->
  <dir>/work/assets/fonts</dir>
  <dir>/work/vendor/rhwp/ttfs/hancom/All</dir>
  <dir>/work/vendor/rhwp/ttfs/hancom/Hwp</dir>
  <dir>/work/vendor/rhwp/ttfs/hancom/flat</dir>
  <!-- 시스템 fonts 폴백 (Ubuntu) -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <!-- 캐시 위치 -->
  <cachedir>/tmp/fontconfig-cache</cachedir>
  <config></config>
</fontconfig>
